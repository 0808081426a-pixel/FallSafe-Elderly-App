<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard | FallGuard+</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<div class="logo">
🛡️ FallGuard+
</div>

<div class="welcome">

<h2>Dashboard 📊</h2>

<p>ติดตามผลการประเมินความเสี่ยง</p>

</div>

</header>



<section class="risk-card">

<h2>ผลการประเมินล่าสุด</h2>

<div id="levelCircle"></div>

<h1 id="score"></h1>
<p id="date"></p>

</section>



<section class="risk-card">

<h3>คำแนะนำ</h3>

<p id="advice">
-
</p>

</section>



<div style="text-align:center;margin:30px;">

<a href="index.html">

<button>
กลับหน้าหลัก
</button>

</a>

</div>



<script>


let score = localStorage.getItem("mfsScore");

let level = localStorage.getItem("riskLevel");


document.getElementById("score").innerHTML =
"คะแนน MFS: " + score + " คะแนน";


let circle = document.getElementById("levelCircle");


if(level=="ต่ำ"){

circle.innerHTML="🟢 ความเสี่ยงต่ำ";

}

else if(level=="ปานกลาง"){

circle.innerHTML="🟡 ความเสี่ยงปานกลาง";

}

else{

circle.innerHTML="🔴 ความเสี่ยงสูง";

}



let today = new Date();

document.getElementById("date").innerHTML =
"วันที่ประเมิน: " +
today.toLocaleDateString("th-TH");



if(level=="ต่ำ"){

document.getElementById("advice").innerHTML =
"รักษาพฤติกรรมสุขภาพที่ดี และออกกำลังกายอย่างสม่ำเสมอ";

}

else if(level=="ปานกลาง"){

document.getElementById("advice").innerHTML =
"ควรปรับสภาพแวดล้อมและเฝ้าระวังการเดิน";

}

else{

document.getElementById("advice").innerHTML =
"ควรมีผู้ดูแล ปรับบ้านให้ปลอดภัย และประเมินซ้ำ";

}


</script>


</body>

</html>
