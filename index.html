<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FallGuard+</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://kit.fontawesome.com/6b6d7ce6e7.js" crossorigin="anonymous"></script>
</head>
<script>
document.addEventListener("DOMContentLoaded", function(){

    const splash = document.getElementById("splashScreen");
    const popup = document.getElementById("guidePopup");

    setTimeout(function(){

        if(splash){
            splash.style.display = "none";
        }

        if(popup){
            popup.style.display = "flex";
        }

    }, 800);

    const score = localStorage.getItem("mfsScore");
    const level = localStorage.getItem("riskLevel");

    const status = document.getElementById("riskStatus");
    const text = document.getElementById("riskText");

    if(score && level && status && text){

        if(level === "ต่ำ"){
            status.innerHTML = "🟢 ความเสี่ยงต่ำ";
            text.innerHTML = "ควรรักษาพฤติกรรมสุขภาพที่ดี";
        }

        else if(level === "ปานกลาง"){
            status.innerHTML = "🟡 ความเสี่ยงปานกลาง";
            text.innerHTML =
                "ควรเฝ้าระวังและปรับพฤติกรรมป้องกันการล้ม";
        }

        else{
            status.innerHTML =
                "🔴 มีความเสี่ยงต่อการพลัดตกหกล้ม";

            text.innerHTML =
                "ควรได้รับคำแนะนำและประเมินปัจจัยเสี่ยงเพิ่มเติม";
        }
    }

});

function closeGuide(){

    const popup = document.getElementById("guidePopup");

    if(popup){
        popup.style.display = "none";
    }
}

function openGuide(){

    const popup = document.getElementById("guidePopup");

    if(popup){
        popup.style.display = "flex";
    }
}
</script>
</nav>

<div id="guidePopup" class="guide-popup">

    <div class="guide-box">

        <div class="guide-icon">👋</div>

        <h2>ยินดีต้อนรับสู่ FallGuard+</h2>

        <p class="guide-intro">
            ทำตามขั้นตอนง่าย ๆ ตามลำดับ 1–5
        </p>

        <div class="guide-step">
            <span>1</span>
            <p>ประเมินความเสี่ยงการพลัดตกหกล้ม</p>
        </div>

        <div class="guide-step">
            <span>2</span>
            <p>ดูคะแนนและผลการประเมิน</p>
        </div>

        <div class="guide-step">
            <span>3</span>
            <p>ฝึกกิจกรรมป้องกันผ่านวิดีโอ</p>
        </div>

        <div class="guide-step">
            <span>4</span>
            <p>ศึกษาวิธีป้องกันการหกล้มที่บ้าน</p>
        </div>

        <div class="guide-step">
            <span>5</span>
            <p>ประเมินความพึงพอใจในการใช้งาน</p>
        </div>

        <button
            id="closeGuideButton"
            type="button"
            class="guide-button"
        >
            เริ่มใช้งาน
        </button>

    </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

    const splash =
        document.getElementById("splashScreen");

    const popup =
        document.getElementById("guidePopup");

    const openButton =
        document.querySelector(
            'button[onclick="openGuide()"]'
        );

    const closeButton =
        document.getElementById("closeGuideButton");

    /* ปิด Splash แล้วแสดงคำแนะนำ */
    setTimeout(function(){

        if(splash){
            splash.style.display = "none";
        }

        if(popup){
            popup.style.display = "flex";
        }

    }, 800);


    /* ปุ่มดูวิธีใช้งาน */
    if(openButton && popup){

        openButton.addEventListener("click", function(){

            popup.style.display = "flex";

        });
    }


    /* ปุ่มเริ่มใช้งาน */
    if(closeButton && popup){

        closeButton.addEventListener("click", function(){

            popup.style.display = "none";

        });
    }


    /* แสดงผลประเมินล่าสุด */
    const score =
        localStorage.getItem("mfsScore");

    const level =
        localStorage.getItem("riskLevel");

    const status =
        document.getElementById("riskStatus");

    const text =
        document.getElementById("riskText");

    if(score && level && status && text){

        if(level === "ต่ำ"){

            status.innerHTML =
                "🟢 ความเสี่ยงต่ำ";

            text.innerHTML =
                "ควรรักษาพฤติกรรมสุขภาพที่ดี";
        }

        else if(level === "ปานกลาง"){

            status.innerHTML =
                "🟡 ความเสี่ยงปานกลาง";

            text.innerHTML =
                "ควรเฝ้าระวังและป้องกันการหกล้ม";
        }

        else{

            status.innerHTML =
                "🔴 มีความเสี่ยงต่อการพลัดตกหกล้ม";

            text.innerHTML =
                "ควรได้รับคำแนะนำและประเมินเพิ่มเติม";
        }
    }

});


/* สำรองสำหรับ onclick เดิม */
function openGuide(){

    const popup =
        document.getElementById("guidePopup");

    if(popup){
        popup.style.display = "flex";
    }
}

function closeGuide(){

    const popup =
        document.getElementById("guidePopup");

    if(popup){
        popup.style.display = "none";
    }
}
</script>

<script src="script.js"></script>

</body>
</html>
